name: Build Packages (Test)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PACKAGE_NAME: bluecross

jobs:
  build-deb:
    name: Test DEB build (${{ matrix.codename }})
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            codename: noble
            container: ""
          - os: ubuntu-latest
            codename: questing
            container: ubuntu:25.10
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          if [ -n "${{ matrix.container }}" ]; then
            apt-get update
            apt-get install -y \
              build-essential \
              debhelper \
              dh-python \
              pybuild-plugin-pyproject \
              python3-all \
              python3-pip \
              python3-hatchling \
              python3-evdev \
              devscripts \
              fakeroot
          else
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              debhelper \
              dh-python \
              pybuild-plugin-pyproject \
              python3-all \
              python3-pip \
              python3-hatchling \
              python3-evdev \
              devscripts \
              fakeroot
          fi

      - name: Prepare source directory
        run: |
          VERSION=0.1.0
          mkdir -p build
          tar --exclude='.git' --exclude='build' \
            --transform "s,^,${PACKAGE_NAME}-${VERSION}/," \
            -czf build/${PACKAGE_NAME}_${VERSION}.orig.tar.gz .

      - name: Setup debian directory
        run: |
          cp -r packaging/debian debian
          chmod +x debian/rules
          chmod +x debian/postinst debian/postrm

      - name: Build DEB package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/
          ls -la dist/

      - name: Test package installation
        run: |
          sudo dpkg -i dist/*.deb || sudo apt-get install -f -y
          which bluecross-server
          which bluecross-client
          which bluecrossctl

  build-rpm:
    name: Test RPM build (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    
    steps:
      - name: Install git
        run: dnf install -y git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-hatchling \
            python3-evdev

      - name: Setup RPM build environment
        run: rpmdev-setuptree

      - name: Prepare source tarball
        run: |
          VERSION=0.1.0
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r bluecross pyproject.toml README.md bluecross.json \
            systemd packaging ${PACKAGE_NAME}-${VERSION}/
          tar -czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz \
            ${PACKAGE_NAME}-${VERSION}

      - name: Copy spec file
        run: cp packaging/rpm/bluecross.spec ~/rpmbuild/SPECS/

      - name: Build RPM package
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/bluecross.spec
          ls -la ~/rpmbuild/RPMS/noarch/

      - name: Test package installation
        run: |
          dnf install -y ~/rpmbuild/RPMS/noarch/*.rpm
          which bluecross-server
          which bluecross-client
          which bluecrossctl

  build-python:
    name: Test Python build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Build package
        run: python -m build

      - name: Test installation
        run: |
          pip install dist/*.whl
          which bluecross-server
          which bluecross-client
          which bluecrossctl

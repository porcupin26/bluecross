name: Build and Release Packages

# BlueCross is Linux/Wayland only (kernel evdev/uinput + wl-clipboard). Windows
# (.exe) and macOS (.dmg) targets are intentionally not built: the evdev crate
# does not compile off Linux. Released artifacts: a portable static binary, a
# portable tarball, and native .deb / .rpm packages.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without v prefix)'
        required: true
        default: '0.1.0'

env:
  PACKAGE_NAME: bluecross

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

  build-static:
    name: Build static binary (musl)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/bluecross dist/bluecross-linux-x86_64
          chmod +x dist/bluecross-linux-x86_64
          # Portable tarball: binary + example config + systemd units + docs.
          STAGE="bluecross-${{ needs.version.outputs.version }}-linux-x86_64"
          mkdir -p "$STAGE"
          cp dist/bluecross-linux-x86_64 "$STAGE/bluecross"
          cp bluecross.json "$STAGE/bluecross.json.example"
          cp README.md "$STAGE/"
          cp -r systemd "$STAGE/"
          cp packaging/udev/99-bluecross-uinput.rules "$STAGE/"
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
      - uses: actions/upload-artifact@v4
        with:
          name: static
          path: dist/*

  build-deb:
    name: Build DEB (${{ matrix.codename }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
            container: debian:12
          - codename: noble
            container: ubuntu:24.04
          - codename: jammy
            container: ubuntu:22.04
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential curl debhelper devscripts fakeroot git ca-certificates
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Prepare orig tarball
        run: |
          VERSION=${{ needs.version.outputs.version }}
          mkdir -p build
          tar --exclude='.git' --exclude='build' --exclude='target' \
            --transform "s,^,${PACKAGE_NAME}-${VERSION}/," \
            -czf build/${PACKAGE_NAME}_${VERSION}.orig.tar.gz .
      - name: Setup debian directory
        run: |
          VERSION=${{ needs.version.outputs.version }}
          cp -r packaging/debian debian
          sed -i "s/0.1.0-1/${VERSION}-1/g" debian/changelog
          sed -i "s/unstable/${{ matrix.codename }}/g" debian/changelog
          chmod +x debian/rules debian/postinst debian/postrm
      - name: Build DEB package
        run: |
          source "$HOME/.cargo/env"
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          for f in ../*.deb; do
            base=$(basename "$f" .deb)
            mv "$f" "dist/${base}_${{ matrix.codename }}.deb"
          done
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: dist/*.deb

  build-rpm:
    name: Build RPM (Fedora ${{ matrix.version_id }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        version_id: [40, 41]
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.version_id }}
    steps:
      - name: Install tools
        run: dnf install -y git rpm-build rpmdevtools gcc util-linux
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build RPM package
        run: |
          source "$HOME/.cargo/env"
          rpmdev-setuptree
          VERSION=${{ needs.version.outputs.version }}
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/rpm/bluecross.spec
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r src Cargo.toml Cargo.lock README.md bluecross.json \
            systemd packaging ${PACKAGE_NAME}-${VERSION}/
          tar -czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz ${PACKAGE_NAME}-${VERSION}
          cp packaging/rpm/bluecross.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/bluecross.spec
          mkdir -p dist && cp ~/rpmbuild/RPMS/*/*.rpm dist/
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora${{ matrix.version_id }}
          path: dist/*.rpm

  release:
    name: Create GitHub Release
    needs: [version, build-static, build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name 'bluecross-linux-x86_64' \) \
            -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt && ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: BlueCross v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
          body: |
            BlueCross is **Linux/Wayland only** (kernel evdev/uinput + wl-clipboard).

            > Security: the network link is encrypted and mutually authenticated
            > with a pre-shared key. Set the same random `psk` (>= 16 chars) on the
            > server and every client. Generate one with:
            > `head -c 32 /dev/urandom | base64`

            ## Install

            ### Portable static binary (any x86_64 Linux)
            ```bash
            curl -L -o bluecross ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ needs.version.outputs.version }}/bluecross-linux-x86_64
            chmod +x bluecross && sudo mv bluecross /usr/local/bin/
            sudo ln -sf /usr/local/bin/bluecross /usr/local/bin/bluecross-server
            sudo ln -sf /usr/local/bin/bluecross /usr/local/bin/bluecross-client
            sudo ln -sf /usr/local/bin/bluecross /usr/local/bin/bluecrossctl
            ```

            ### Debian / Ubuntu
            ```bash
            sudo apt install ./bluecross_${{ needs.version.outputs.version }}-1_amd64_<codename>.deb
            ```

            ### Fedora
            ```bash
            sudo dnf install ./bluecross-${{ needs.version.outputs.version }}-1.*.rpm
            ```

            Then add yourself to the `input` group and set up a config — see the
            [README](${{ github.server_url }}/${{ github.repository }}#readme).

name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without v prefix)'
        required: true
        default: '0.1.0'

env:
  PACKAGE_NAME: bluecross

jobs:
  build-deb:
    name: Build DEB packages
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            codename: jammy
            container: ""
          - os: ubuntu-24.04
            codename: noble
            container: ""
          - os: ubuntu-latest
            codename: questing
            container: ubuntu:25.10
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          if [ -n "${{ matrix.container }}" ]; then
            apt-get update
            apt-get install -y \
              build-essential \
              debhelper \
              dh-python \
              python3-all \
              python3-setuptools \
              python3-pip \
              python3-build \
              python3-hatchling \
              python3-evdev \
              devscripts \
              fakeroot
          else
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              debhelper \
              dh-python \
              python3-all \
              python3-setuptools \
              python3-pip \
              python3-build \
              python3-hatchling \
              python3-evdev \
              devscripts \
              fakeroot
          fi

      - name: Prepare source directory
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p build
          # Create source tarball
          tar --exclude='.git' --exclude='build' \
            --transform "s,^,${PACKAGE_NAME}-${VERSION}/," \
            -czf build/${PACKAGE_NAME}_${VERSION}.orig.tar.gz .

      - name: Setup debian directory
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Copy debian packaging files
          cp -r packaging/debian debian
          # Update changelog with current version
          sed -i "s/0.1.0-1/${VERSION}-1/g" debian/changelog
          sed -i "s/unstable/${{ matrix.codename }}/g" debian/changelog
          # Make scripts executable
          chmod +x debian/rules
          chmod +x debian/postinst debian/postrm

      - name: Build DEB package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/

      - name: Rename package with distro info
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd dist
          for f in *.deb; do
            newname="${f%.deb}_${{ matrix.codename }}.deb"
            mv "$f" "$newname"
          done

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: dist/*.deb

  build-rpm:
    name: Build RPM packages
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            distro: fedora
            version: 39
          - os: ubuntu-latest
            distro: fedora
            version: 40
    runs-on: ${{ matrix.os }}
    container:
      image: fedora:${{ matrix.version }}
    
    steps:
      - name: Install git
        run: dnf install -y git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-hatchling \
            python3-evdev

      - name: Setup RPM build environment
        run: |
          rpmdev-setuptree

      - name: Prepare source tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          # Copy source files
          cp -r bluecross pyproject.toml README.md bluecross.json \
            systemd packaging ${PACKAGE_NAME}-${VERSION}/
          # Create tarball
          tar -czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz \
            ${PACKAGE_NAME}-${VERSION}

      - name: Update spec version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/rpm/bluecross.spec
          cp packaging/rpm/bluecross.spec ~/rpmbuild/SPECS/

      - name: Build RPM package
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/bluecross.spec
          mkdir -p dist
          cp ~/rpmbuild/RPMS/noarch/*.rpm dist/

      - name: Rename package with distro info
        run: |
          cd dist
          for f in *.rpm; do
            newname="${f%.rpm}.${{ matrix.distro }}${{ matrix.version }}.rpm"
            mv "$f" "$newname"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.distro }}${{ matrix.version }}
          path: dist/*.rpm

  build-python:
    name: Build Python package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Build package
        run: python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm, build-python]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.whl" -o -name "*.tar.gz" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: BlueCross v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*
          body: |
            ## Installation

            ### Debian/Ubuntu
            ```bash
            # Download the appropriate .deb file for your distribution
            sudo dpkg -i bluecross_${{ steps.version.outputs.version }}-1_all_<codename>.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```

            ### Fedora
            ```bash
            # Download the appropriate .rpm file for your Fedora version
            sudo dnf install bluecross-${{ steps.version.outputs.version }}-1.noarch.<distro>.rpm
            ```

            ### Python (pip)
            ```bash
            pip install bluecross-${{ steps.version.outputs.version }}.tar.gz
            # or
            pip install bluecross-${{ steps.version.outputs.version }}-py3-none-any.whl
            ```

            ### Post-installation
            After installing, add your user to the `input` group:
            ```bash
            sudo usermod -aG input $USER
            ```
            Then log out and back in for the change to take effect.

            See the [README](https://github.com/kzapolski/bluecross#readme) for configuration and usage instructions.
